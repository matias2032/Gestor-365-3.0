name: gestor_365
description: "Gestor 365 - Sistema de Gestão de Bar"
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: '>=3.10.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite_common_ffi: ^2.3.4  
  http: ^1.2.0
  timezone: ^0.9.2
  flutter_secure_storage: ^9.2.2

  # Supabase
  supabase_flutter: ^2.5.0

  # Conectividade
  connectivity_plus: ^6.0.0
  internet_connection_checker: ^3.0.1

  flutter_local_notifications: ^21.0.0
  workmanager: ^0.6.0
  
  # CORE
  cupertino_icons: ^1.0.8
  file_picker: ^10.3.7
  shared_preferences: ^2.2.2
  intl: ^0.20.2

  # DATABASE / SECURITY
  sqflite: ^2.3.2
  path: ^1.8.3
  path_provider: ^2.1.3

  # UI / REPORTS
  fl_chart: ^1.1.1
  pdf: ^3.11.0
  printing: ^5.11.0
  open_file: ^3.3.2
  bcrypt: ^1.1.3
  firebase_core: ^4.3.0
  firebase_messaging: ^16.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  crypto: ^3.0.3

  
flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"


# Esta seção deve ficar aqui, fora do bloco 'flutter:'
dependency_overrides:
  workmanager: ^0.6.0

  timezone: ^0.9.2 

flutter:
  uses-material-design: true

  assets:
    - assets/icon/

